# Melo Nails - Stack Docker Compose (Raspberry Pi 5 / ARM64)
#
# Stack standardisée (WordPress) :
# - nginx       : reverse proxy HTTP/HTTPS
# - wordpress   : application CMS
# - db          : MariaDB
#
# Option d'archive:
# - app_next    : ancienne piste Next.js (profil "next-archive")
#
# Démarrage WordPress (recommandé) :
#   docker compose up -d
#
# Démarrage piste archive Next.js :
#   docker compose --profile next-archive up -d --build

services:
  # Reverse proxy Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: microerp_nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_logs:/var/log/nginx
    networks:
      - microerp_network

  # Application WordPress (stack officielle)
  wordpress:
    image: wordpress:6.8-php8.3-apache
    container_name: microerp_wordpress
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_DATABASE}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX}
      WORDPRESS_CONFIG_EXTRA: |
        define('FS_METHOD', 'direct');
        define('DISALLOW_FILE_EDIT', true);
        define('AUTOMATIC_UPDATER_DISABLED', false);
        define('WP_POST_REVISIONS', 10);
        define('EMPTY_TRASH_DAYS', 14);
    volumes:
      - wp_core:/var/www/html
      - wp_uploads:/var/www/html/wp-content/uploads
    expose:
      - "80"
    networks:
      - microerp_network

  # Base de données WordPress
  db:
    image: mariadb:11.4
    container_name: microerp_db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - microerp_network

  # Ancienne piste applicative Next.js (optionnelle / archive)
  app_next:
    build:
      context: .
      dockerfile: Dockerfile
    image: melo-nails-next:latest
    container_name: microerp_app_next
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    networks:
      - microerp_network
    profiles:
      - next-archive

networks:
  microerp_network:
    name: microerp_network
    driver: bridge

volumes:
  db_data:
    name: db_data
  wp_core:
    name: wp_core
  wp_uploads:
    name: wp_uploads
  nginx_certs:
    name: nginx_certs
  nginx_logs:
    name: nginx_logs
